<!DOCTYPE html>
<html>
<head>
    <title>Word Frequency Counter</title>
</head>
<body>

    <h2>Word Frequency Counter</h2>

    <form method="POST">
        <textarea name="text" rows="8" cols="60"
        placeholder="Enter your text here..."></textarea><br><br>

        <input type="submit" value="Count Words">
    </form>

    {% if word_count %}
        <h3>Word Frequencies</h3>

        <table border="1" cellpadding="8">
            <tr>
                <th>Word</th>
                <th>Frequency</th>
            </tr>

            {% for word, count in word_count.items() %}
            <tr>
                <td>{{ word }}</td>
                <td>{{ count }}</td>
            </tr>
            {% endfor %}

        </table>
    {% endif %}

</body>
</html>
